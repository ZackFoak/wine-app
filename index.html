<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINE ATLAS</title>
  <style>
    :root {
      --bg: #f6f1eb;
      --panel: rgba(255, 252, 248, 0.88);
      --panel-border: rgba(120, 72, 48, 0.15);
      --text: #2f241f;
      --muted: #7b6a61;
      --accent: #7b1e3a;
      --accent-2: #b8893c;
      --accent-soft: #f3e6d8;
      --shadow: 0 12px 30px rgba(54, 30, 18, 0.12);
      --radius: 18px;
      --map-control-top: 120px;
      --map-control-bottom: 220px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      line-height: 1.5;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff7ef 0%, #f3e7da 35%, #eadccf 100%),
        linear-gradient(135deg, #f8efe6 0%, #f5ece3 100%);
    }

    body {
      display: flex;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100%;
      flex: 1 1 auto;
      filter: saturate(1.02) contrast(1.01);
    }

    #panel {
      width: 32%;
      height: 100vh;
      padding: 24px;
      overflow: auto;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border-left: 1px solid var(--panel-border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      position: relative;
        }

        #panel::before {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0));
          pointer-events: none;
        }
    

    #title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title-text {
      display: inline-block;
    }

    .title-pronounce-btn {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
    }

    #breadcrumb {
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }

    .breadcrumb-link {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }

    .breadcrumb-sep {
      color: #b3a39a;
      padding: 0 6px;
    }

    .toolbar {
      position: absolute;
      left: 24px;
      top: 20px;
      z-index: 1000;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: min(760px, calc(100vw - 80px));
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(54, 30, 18, 0.12);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .toolbar.search-collapsed .toolbar-search-row {
      display: none;
    }

    .toolbar-main-row {
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-scroll-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar-search-row {
      display: flex;
      width: 100%;
    }

    .btn.app-home-btn {
      background: linear-gradient(135deg, #6f102e 0%, #96264b 52%, #c79a46 100%);
      color: white;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: .04em;
      text-transform: uppercase;
      min-height: 48px;
      padding: 12px 22px;
      border: 1px solid rgba(255, 236, 212, 0.34);
      box-shadow:
        0 14px 28px rgba(111, 16, 46, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .btn.app-home-btn:hover {
      background: linear-gradient(135deg, #7b1435 0%, #a62d55 52%, #d3a953 100%);
      box-shadow:
        0 18px 32px rgba(111, 16, 46, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }

    .toolbar-compact-btn {
      background: rgba(255,255,255,0.96);
    }

    .floating-back-btn {
      position: fixed;
      right: max(14px, calc(env(safe-area-inset-right) + 14px));
      bottom: max(18px, calc(env(safe-area-inset-bottom) + 18px));
      z-index: 1200;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255, 252, 248, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 34px rgba(54, 30, 18, 0.18);
      border: 1px solid rgba(120, 72, 48, 0.14);
    }

    .floating-back-btn[hidden] {
      display: none;
    }

    .utility-rail {
      position: absolute;
      left: var(--utility-rail-left, auto);
      top: calc(100% + 10px);
      z-index: 1200;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .utility-rail-toggle {
      min-width: 92px;
      padding: 11px 14px;
      border-radius: 16px;
      border: 1px solid rgba(120, 72, 48, 0.14);
      background: rgba(255, 252, 248, 0.96);
      color: var(--accent);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(54, 30, 18, 0.16);
    }

    .utility-rail-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }

    .utility-rail.collapsed .utility-rail-actions {
      display: none;
    }

    .utility-rail-btn {
      min-width: 132px;
      justify-content: flex-start;
      padding-inline: 14px 18px;
      background: rgba(255, 252, 248, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 26px rgba(54, 30, 18, 0.14);
    }

    .page-action-rail {
      position: fixed;
      right: max(14px, calc(env(safe-area-inset-right) + 14px));
      bottom: max(98px, calc(env(safe-area-inset-bottom) + 98px));
      z-index: 1195;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .page-action-rail[hidden] {
      display: none;
    }

    .page-action-rail-toggle {
      min-width: 86px;
      padding: 11px 14px;
      border-radius: 16px;
      border: 1px solid rgba(120, 72, 48, 0.14);
      background: rgba(255, 252, 248, 0.96);
      color: var(--accent);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(54, 30, 18, 0.16);
    }

    .page-action-rail-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }

    .page-action-rail.collapsed .page-action-rail-actions {
      display: none;
    }

    .page-action-btn {
      min-width: 188px;
      justify-content: flex-start;
      padding-inline: 14px 18px;
      background: rgba(255, 248, 240, 0.98);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 26px rgba(54, 30, 18, 0.14);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      align-items: center;
    }

    .toolbar-toggle {
      display: none;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    #searchInput {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #e1d3c8;
      background: rgba(255,255,255,0.92);
      font-size: 16px;
      outline: none;
    }

    #searchInput:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(184, 137, 60, 0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
      box-shadow: 0 4px 12px rgba(50, 28, 16, 0.06);
      font-weight: 600;
    }

    .btn:focus-visible,
    .pill:focus-visible,
    .pronounce-btn:focus-visible,
    #searchInput:focus-visible,
    .toolbar-toggle:focus-visible {
      outline: 3px solid rgba(184, 137, 60, 0.28);
      outline-offset: 2px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(50, 28, 16, 0.12);
    }

    .btn.active {
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
    }

    .btn.secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .section-card {
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(120,72,48,0.10);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow:
        0 10px 24px rgba(54, 30, 18, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .section-card > :first-child {
      margin-top: 0;
    }

    .section-card > :last-child {
      margin-bottom: 0;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .meta-item {
      padding: 12px;
      border-radius: 14px;
      background: #fffaf5;
      border: 1px solid #efe2d5;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 15px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 7px 12px;
      margin: 4px 6px 4px 0;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #ecdccf;
      cursor: pointer;
      transition: all .15s ease;
      font: inherit;
      color: var(--text);
    }

    .pill:hover {
      background: #fff8f1;
      border-color: #d9b58e;
    }

    .pronounce-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #ecdccf;
      border-radius: 999px;
      background: rgba(255, 252, 248, 0.96);
      color: var(--accent);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(50, 28, 16, 0.06);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      vertical-align: middle;
    }

    .pronounce-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(50, 28, 16, 0.12);
      background: #fff;
    }

    .list-card {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #eadccf;
      background: rgba(255,255,255,0.8);
      margin-bottom: 10px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      border: 1px solid #eadccf;
      box-shadow: 0 8px 20px rgba(54, 30, 18, 0.05);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 42px;
      gap: 10px;
      align-items: center;
    }

    .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #efe5db;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #b8893c);
    }

    .bar-value {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      font-weight: 700;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
    }

    .mastery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mastery-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid #eadccf;
    }

    .mastery-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mastery-name {
      font-size: 14px;
      font-weight: 700;
    }

    .mastery-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .mastery-badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .mastery-badge.good {
      background: rgba(31, 122, 68, 0.12);
      color: #1f7a44;
    }

    .mastery-badge.mid {
      background: rgba(184, 137, 60, 0.14);
      color: #9a6b18;
    }

    .mastery-badge.bad {
      background: rgba(180, 35, 24, 0.12);
      color: #b42318;
    }

    .dashboard-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .dashboard-grid {
        grid-template-columns: 1fr 1fr;
      }

      .bar-row {
        grid-template-columns: 90px 1fr 34px;
        gap: 8px;
      }

      .stat-value {
        font-size: 20px;
      }
    }

    .quiz-result-good {
      color: #1f7a44;
      font-weight: 700;
    }

    .quiz-result-bad {
      color: #b42318;
      font-weight: 700;
    }

    ul {
      padding-left: 18px;
    }

    li {
      margin-bottom: 6px;
    }

    p {
      margin: 0 0 12px;
    }

    @media (max-width: 1024px) {
      body {
        overflow: hidden;
      }

      #map {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        z-index: 1;
      }

      .toolbar {
        width: calc(100vw - 20px);
        left: 10px;
        top: 10px;
        padding: 12px;
        border-radius: 16px;
        z-index: 1100;
      }

      #bottomSheet {
        z-index: 1000;
      }

      #title {
        font-size: 24px;
        margin-top: 8px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
      html, body {
        background: transparent;
      }
    }
     .loading-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(120,72,48,0.12);
    }

    @media (max-width: 640px) {
      .toolbar {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        padding: 8px;
        gap: 6px;
        border-radius: 18px;
      }

      .toolbar-row {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
      }

      .toolbar-main-row {
        align-items: center;
        overflow: hidden;
      }

      .toolbar .btn {
        width: auto;
        flex: 0 0 auto;
        min-height: 42px;
        padding: 9px 14px;
        font-size: 14px;
        border-radius: 14px;
      }

      .btn.app-home-btn {
        min-height: 42px;
        padding: 10px 18px;
        font-size: 14px;
        letter-spacing: 0.02em;
        position: sticky;
        left: 0;
        z-index: 2;
        box-shadow:
          0 10px 20px rgba(111, 16, 46, 0.22),
          inset 0 1px 0 rgba(255,255,255,0.24);
      }

      .toolbar-scroll-strip {
        flex: 1 1 auto;
        min-width: 0;
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }

      .toolbar-scroll-strip::-webkit-scrollbar {
        display: none;
      }

      .toolbar-search-row,
      .toolbar.search-collapsed .toolbar-search-row {
        width: 100%;
      }

      .cycle-network-grid {
        grid-template-columns: 1fr;
      }

      .cycle-network-connector {
        min-height: auto;
      }

      .cycle-connector-line {
        width: 100%;
      }

      #searchInput {
        width: 100%;
        min-width: 0;
        padding: 12px 14px;
        font-size: 15px;
      }

      .pill {
        width: 100%;
        text-align: center;
      }

      #map {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
      }

      #bottomSheet {
        height: var(--sheet-height, 68dvh);
      }

      .utility-rail {
        top: calc(100% + 8px);
      }

      .utility-rail-toggle {
        min-width: 84px;
      }

      .utility-rail-btn {
        min-width: 120px;
      }

      .page-action-rail {
        bottom: max(86px, calc(env(safe-area-inset-bottom) + 86px));
      }

      .page-action-rail-toggle {
        min-width: 78px;
      }

      .page-action-btn {
        min-width: 166px;
      }

      #title {
        font-size: 26px;
      }

      .sheet-handle-wrap {
        padding: 10px 14px 8px;
      }

      .sheet-body {
        padding: 8px 14px calc(168px + env(safe-area-inset-bottom));
      }
    }

    @media (min-width: 1025px) {
      .floating-back-btn {
        display: none;
      }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #eadccf;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .loading-text {
      color: var(--muted);
      font-weight: 600;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .panel-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: 0 8px 16px rgba(123, 30, 58, 0.18);
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
    }
    #bottomSheet {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: var(--sheet-height, 68vh);
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
      transform: translateY(32%);
      transition: transform 0.26s ease;
      z-index: 1000;
      overflow: hidden;
      will-change: transform;
    }
    
    #bottomSheet.state-collapsed,
    #bottomSheet.state-mid,
    #bottomSheet.state-open {
      transform: translateY(var(--sheet-translate, 32%));
    }
    
    #bottomSheet.open {
      transform: translateY(0%);
    }

    .sheet-handle-wrap {
      flex: 0 0 auto;
      padding: 12px 16px 8px;
      border-bottom: 1px solid rgba(120,72,48,0.08);
      background: rgba(255,255,255,0.92);
      touch-action: none;
    }

    .sheet-body {
      flex: 1 1 auto;
      height: 0;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
      padding: 8px 16px calc(180px + env(safe-area-inset-bottom));
      min-height: 0;
    }

    #content {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }

    .sheet-handle:active {
      cursor: grabbing;
    }

    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }
    
    #bottomSheet.state-collapsed #title,
    #bottomSheet.state-collapsed #breadcrumb,
    #bottomSheet.state-collapsed .panel-badge,
    #bottomSheet.state-collapsed .sheet-body {
      opacity: 0;
      pointer-events: none;
    }
    /* fully open */
    #bottomSheet.open {
      transform: translateY(0%);
    }

    /* handle bar */
    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }
    .leaflet-control-zoom a {
      border-radius: 12px !important;
    }

    .leaflet-top.leaflet-left {
      top: var(--map-control-top);
      bottom: var(--map-control-bottom);
      display: flex;

    .factor-origin-badge {

    }

    .factor-flow-arrow-lake,
    .factor-origin-lake {
      background: linear-gradient(135deg, #4aa4cf, #69bbe0);
    }

    .factor-flow-arrow-wind,
    .factor-origin-wind {

    }

    .factor-flow-arrow-mountain,
    .factor-origin-mountain {

    }

    .factor-flow-arrow-generic,

      from {
        stroke-dashoffset: 0;
      }
      to {

      }

    @keyframes factor-arrow-pulse {
      0%, 100% {
        transform: rotate(var(--factor-arrow-rotation, 0deg)) scale(1);
      }
      50% {
        transform: rotate(var(--factor-arrow-rotation, 0deg)) scale(1.08);
      }

    @keyframes factor-origin-pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.06);
      }

    .leaflet-container {
      background: #dcecf2;
    }

    .region-map-marker-wrap {

        calc(-50% + var(--marker-shift-y, 0px))
      );
      transition: transform .2s ease;
    }

    .country-map-marker-wrap {
      background: transparent;
      border: none;
      transform: translate(
        calc(-50% + var(--marker-shift-x, 0px)),
        calc(-50% + var(--marker-shift-y, 0px))
      );
      transition: transform .2s ease;

    .country-map-marker {
      position: relative;
      border: 1px solid rgba(47, 36, 31, 0.12);
      background: rgba(255, 252, 248, 0.94);
      color: var(--text);
      border-radius: 999px;
      min-height: 50px;
      padding: 12px 20px;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(54, 30, 18, 0.14);
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;

      content: "";
      position: absolute;
      left: 50%;
      bottom: -9px;
      width: 14px;
      height: 14px;
      background: inherit;
      border-right: 1px solid rgba(47, 36, 31, 0.12);
      border-bottom: 1px solid rgba(47, 36, 31, 0.12);
      transform: translateX(-50%) rotate(45deg);
      border-bottom-right-radius: 4px;
      pointer-events: none;

      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(54, 30, 18, 0.2);
      background: #fff;
    }

    .region-map-marker {
      position: relative;
      border: 1px solid rgba(123, 30, 58, 0.18);
      background: rgba(255, 252, 248, 0.96);

      padding: 10px 16px;

      font-size: 14px;
      font-weight: 800;

      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(54, 30, 18, 0.18);

      flex-direction: column;
      align-items: flex-start;

      letter-spacing: .03em;
      line-height: 1;
      color: #5a2b39;
      white-space: nowrap;

      border-color: rgba(47, 134, 197, 0.22);

      border-color: rgba(112, 142, 71, 0.22);

    .map-climate-chip.warm {
      background: rgba(255, 239, 220, 0.97);
      color: #9a5418;
      border-color: rgba(200, 126, 48, 0.24);
    }

    .subregion-map-marker {

      box-shadow: 0 9px 20px rgba(72, 42, 20, 0.14);
    }

    .region-map-marker.is-selected {

      transform: translateY(-1px) scale(1.04);

    .region-map-marker::after {

      left: 50%;

      width: 12px;
      height: 12px;
      background: inherit;
      border-right: 1px solid rgba(123, 30, 58, 0.18);
      border-bottom: 1px solid rgba(123, 30, 58, 0.18);

    .cycle-mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .cycle-mini-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(120,72,48,0.12);
      box-shadow: 0 8px 18px rgba(54, 30, 18, 0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cycle-mini-head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .cycle-mini-number {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(135deg, #7b1e3a, #b8893c);
      color: white;
      font-size: 11px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .cycle-mini-icon {
      font-size: 18px;
    }

    .study-highlight {
      display: inline;
      padding: 0 2px;
      border-radius: 4px;
      background: rgba(248, 232, 206, 0.72);
      color: #7b4c14;
      font-weight: 800;
      line-height: inherit;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .study-highlight.water {
      background: rgba(225, 239, 252, 0.78);
      color: #125985;
    }

    .study-highlight.terrain {
      background: rgba(235, 228, 248, 0.78);
      color: #5d4780;
    }

    .study-highlight.climate {
      background: rgba(239, 246, 230, 0.82);
      color: #4d6f1f;
    }

    .study-highlight.human {
      background: rgba(249, 230, 221, 0.8);
      color: #8b4428;
    }

    .search-snippet {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (min-width: 1025px) {
      #title {
        font-size: 32px;
      }

      #content {
        width: min(100%, 1180px);
      }

      .section-card {
        padding: 22px 24px;
      }
    }

<div class="toolbar search-collapsed" id="topToolbar">

    <div class="toolbar-scroll-strip" id="toolbarScrollStrip">
      <button class="btn toolbar-compact-btn" id="toolbarToggle" type="button" aria-expanded="false">Search ▾</button>
      <button class="btn filter-btn active" data-filter="all">All</button>
      <button class="btn filter-btn" data-filter="still">Still</button>
      <button class="btn filter-btn" data-filter="sparkling">Sparkling</button>
      <button class="btn filter-btn" data-filter="fortified">Fortified</button>
      <button class="btn secondary toolbar-compact-btn" id="utilityRailToggle" type="button" aria-expanded="false">Tools ▾</button>
    </div>
  </div>

  <div class="toolbar-row toolbar-search-row" id="toolbarSearchRow">
    <input id="searchInput" placeholder="Search country, region, or grape..." />
  </div>

  <div class="utility-rail collapsed" id="utilityRail">
    <div class="utility-rail-actions" id="utilityRailActions">
      <button class="btn secondary utility-rail-btn" id="quizBtn" type="button">Quiz</button>
      <button class="btn secondary utility-rail-btn" id="favoritesBtn" type="button">Favorites</button>
      <button class="btn secondary utility-rail-btn" id="progressBtn" type="button">Progress</button>
      <button class="btn secondary utility-rail-btn" id="recentBtn" type="button">Recent</button>
      <button class="btn secondary utility-rail-btn" id="cycleToolBtn" type="button">Cycle Logic</button>
    </div>
  </div>
</div>

<div id="map"></div>
<div id="bottomSheet" class="state-mid">
  <div class="sheet-handle-wrap">

    <div id="breadcrumb" style="margin-bottom:10px; color:#666;"></div>
  </div>

  <div class="sheet-body" id="sheetBody">
    <div id="content">
      <div class="section-card">
        <p class="section-title">Welcome</p>

        <p>Use Search, Quiz, Favorites, and Progress to build your knowledge.</p>

  </div>
</div>
