<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine Atlas PRO</title>
  <style>
    :root {
      --bg: #f6f1eb;
      --panel: rgba(255, 252, 248, 0.88);
      --panel-border: rgba(120, 72, 48, 0.15);
      --text: #2f241f;
      --muted: #7b6a61;
      --accent: #7b1e3a;
      --accent-2: #b8893c;
      --accent-soft: #f3e6d8;
      --shadow: 0 12px 30px rgba(54, 30, 18, 0.12);
      --radius: 18px;
      --map-control-top: 120px;
      --map-control-bottom: 220px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff7ef 0%, #f3e7da 35%, #eadccf 100%),
        linear-gradient(135deg, #f8efe6 0%, #f5ece3 100%);
    }

    body {
      display: flex;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100%;
      flex: 1 1 auto;
      filter: saturate(1.02) contrast(1.01);
    }

    #panel {
      width: 32%;
      height: 100vh;
      padding: 24px;
      overflow: auto;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border-left: 1px solid var(--panel-border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      position: relative;
        }

        #panel::before {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0));
          pointer-events: none;
        }
    

    #title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title-text {
      display: inline-block;
    }

    .title-pronounce-btn {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
    }

    #breadcrumb {
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .breadcrumb-link {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }

    .breadcrumb-sep {
      color: #b3a39a;
      padding: 0 6px;
    }

    .toolbar {
      position: absolute;
      left: 24px;
      top: 20px;
      z-index: 1000;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: min(760px, calc(100vw - 80px));
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      align-items: center;
    }

    .toolbar-toggle {
      display: none;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    #searchInput {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #e1d3c8;
      background: rgba(255,255,255,0.92);
      font-size: 14px;
      outline: none;
    }

    #searchInput:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(184, 137, 60, 0.12);
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
      box-shadow: 0 4px 12px rgba(50, 28, 16, 0.06);
      font-weight: 600;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(50, 28, 16, 0.12);
    }

    .btn.active {
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
    }

    .btn.secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .section-card {
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(120,72,48,0.10);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow:
        0 10px 24px rgba(54, 30, 18, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .meta-item {
      padding: 12px;
      border-radius: 14px;
      background: #fffaf5;
      border: 1px solid #efe2d5;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 15px;
      font-weight: 700;
    }

    .pill {
      display: inline-block;
      padding: 7px 10px;
      margin: 4px 6px 4px 0;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #ecdccf;
      cursor: pointer;
      transition: all .15s ease;
    }

    .pill:hover {
      background: #fff8f1;
      border-color: #d9b58e;
    }

    .pronounce-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #ecdccf;
      border-radius: 999px;
      background: rgba(255, 252, 248, 0.96);
      color: var(--accent);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(50, 28, 16, 0.06);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      vertical-align: middle;
    }

    .pronounce-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(50, 28, 16, 0.12);
      background: #fff;
    }

    .list-card {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #eadccf;
      background: rgba(255,255,255,0.8);
      margin-bottom: 10px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      border: 1px solid #eadccf;
      box-shadow: 0 8px 20px rgba(54, 30, 18, 0.05);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 42px;
      gap: 10px;
      align-items: center;
    }

    .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #efe5db;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #b8893c);
    }

    .bar-value {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      font-weight: 700;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
    }

    .mastery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mastery-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid #eadccf;
    }

    .mastery-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mastery-name {
      font-size: 14px;
      font-weight: 700;
    }

    .mastery-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .mastery-badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .mastery-badge.good {
      background: rgba(31, 122, 68, 0.12);
      color: #1f7a44;
    }

    .mastery-badge.mid {
      background: rgba(184, 137, 60, 0.14);
      color: #9a6b18;
    }

    .mastery-badge.bad {
      background: rgba(180, 35, 24, 0.12);
      color: #b42318;
    }

    .dashboard-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .dashboard-grid {
        grid-template-columns: 1fr 1fr;
      }

      .bar-row {
        grid-template-columns: 90px 1fr 34px;
        gap: 8px;
      }

      .stat-value {
        font-size: 20px;
      }
    }

    .quiz-result-good {
      color: #1f7a44;
      font-weight: 700;
    }

    .quiz-result-bad {
      color: #b42318;
      font-weight: 700;
    }

    ul {
      padding-left: 18px;
    }

    li {
      margin-bottom: 6px;
    }

    @media (max-width: 1024px) {
      body {
        overflow: hidden;
      }

      #map {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        z-index: 1;
      }

      .toolbar {
        width: calc(100vw - 20px);
        left: 10px;
        top: 10px;
        padding: 12px;
        border-radius: 16px;
        z-index: 1100;
      }

      #bottomSheet {
        z-index: 1000;
      }

      #title {
        font-size: 24px;
        margin-top: 8px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
      html, body {
        background: transparent;
      }
    }
     .loading-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(120,72,48,0.12);
    }

    @media (max-width: 640px) {
      .toolbar {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        padding: 10px;
        gap: 8px;
      }

      .toolbar-toggle {
        display: block;
      }

      .toolbar-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .toolbar-row:first-of-type {
        display: block;
      }

      #toolbarActions {
        display: none;
      }

      .toolbar.expanded #toolbarActions {
        display: grid;
      }

      #searchInput {
        width: 100%;
      }

      .btn,
      .pill {
        width: 100%;
        text-align: center;
      }

      #map {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
      }

      #bottomSheet {
        height: var(--sheet-height, 72dvh);
      }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #eadccf;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .loading-text {
      color: var(--muted);
      font-weight: 600;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .panel-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #9a274b);
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: 0 8px 16px rgba(123, 30, 58, 0.18);
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
    }
    #bottomSheet {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: var(--sheet-height, 68vh);
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
      transform: translateY(32%);
      transition: transform 0.26s ease;
      z-index: 1000;
      overflow: hidden;
      will-change: transform;
    }
    
    #bottomSheet.state-collapsed,
    #bottomSheet.state-mid,
    #bottomSheet.state-open {
      transform: translateY(var(--sheet-translate, 32%));
    }
    
    #bottomSheet.open {
      transform: translateY(0%);
    }

    .sheet-handle-wrap {
      flex: 0 0 auto;
      padding: 12px 16px 8px;
      border-bottom: 1px solid rgba(120,72,48,0.08);
      background: rgba(255,255,255,0.92);
      touch-action: none;
    }

    .sheet-body {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 8px 16px calc(120px + env(safe-area-inset-bottom));
      min-height: 0;
    }

    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }

    .sheet-handle:active {
      cursor: grabbing;
    }

    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }
    
    #bottomSheet.state-collapsed #title,
    #bottomSheet.state-collapsed #breadcrumb,
    #bottomSheet.state-collapsed .panel-badge,
    #bottomSheet.state-collapsed .sheet-body {
      opacity: 0;
      pointer-events: none;
    }
    /* fully open */
    #bottomSheet.open {
      transform: translateY(0%);
    }

    /* handle bar */
    .sheet-handle {
      width: 48px;
      height: 6px;
      background: #ccc;
      border-radius: 999px;
      margin: 0 auto 12px;
      cursor: grab;
      touch-action: none;
    }
    .leaflet-control-zoom a {
      border-radius: 12px !important;
    }

    .leaflet-top.leaflet-left {
      top: var(--map-control-top);
      bottom: var(--map-control-bottom);
      display: flex;
      flex-direction: column;
      justify-content: center;
      pointer-events: none;
    }

    .leaflet-top.leaflet-left .leaflet-control {
      margin-top: 0;
      pointer-events: auto;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 14px;
    }

    .leaflet-container {
      background: #dcecf2;
    }

    .region-map-marker-wrap {
      background: transparent;
      border: none;
      transform: translate(
        calc(-50% + var(--marker-shift-x, 0px)),
        calc(-50% + var(--marker-shift-y, 0px))
      );
      transition: transform .2s ease;
    }

    .country-map-marker-wrap {
      background: transparent;
      border: none;
      transform: translate(
        calc(-50% + var(--marker-shift-x, 0px)),
        calc(-50% + var(--marker-shift-y, 0px))
      );
      transition: transform .2s ease;
    }

    .country-map-marker {
      position: relative;
      border: 1px solid rgba(47, 36, 31, 0.12);
      background: rgba(255, 252, 248, 0.94);
      color: var(--text);
      border-radius: 999px;
      min-height: 50px;
      padding: 12px 20px;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(54, 30, 18, 0.14);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .country-map-marker::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -9px;
      width: 14px;
      height: 14px;
      background: inherit;
      border-right: 1px solid rgba(47, 36, 31, 0.12);
      border-bottom: 1px solid rgba(47, 36, 31, 0.12);
      transform: translateX(-50%) rotate(45deg);
      border-bottom-right-radius: 4px;
      pointer-events: none;
    }

    .country-map-marker:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(54, 30, 18, 0.2);
      background: #fff;
    }

    .region-map-marker {
      position: relative;
      border: 1px solid rgba(123, 30, 58, 0.18);
      background: rgba(255, 252, 248, 0.96);
      color: var(--accent);
      border-radius: 999px;
      min-height: 44px;
      padding: 10px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(54, 30, 18, 0.18);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .region-map-marker::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 12px;
      height: 12px;
      background: inherit;
      border-right: 1px solid rgba(123, 30, 58, 0.18);
      border-bottom: 1px solid rgba(123, 30, 58, 0.18);
      transform: translateX(-50%) rotate(45deg);
      border-bottom-right-radius: 4px;
      pointer-events: none;
    }

    .region-map-marker:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(54, 30, 18, 0.22);
      background: #fff;
    }

    .country-map-marker:hover,
    .country-map-marker:focus-visible,
    .region-map-marker:hover,
    .region-map-marker:focus-visible {
      outline: none;
      z-index: 20;
    }

    .country-map-marker-wrap:hover,
    .country-map-marker-wrap:focus-within,
    .region-map-marker-wrap:hover,
    .region-map-marker-wrap:focus-within {
      z-index: 900 !important;
    }

    @media (max-width: 640px) {
      .country-map-marker {
        min-height: 42px;
        padding: 9px 14px;
        font-size: 13px;
      }

      .region-map-marker {
        min-height: 38px;
        padding: 8px 12px;
        font-size: 12px;
      }
    }

    .meter-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meter-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .meter-dots {
      display: flex;
      gap: 4px;
    }

    @media (min-width: 1025px) {
      .meter-group {
        max-width: 420px;
      }

      .meter-row {
        display: grid;
        grid-template-columns: 90px auto;
        justify-content: start;
        column-gap: 14px;
      }
    }

    .meter-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e6dcd2;
    }

    .meter-dot.filled {
      background: var(--accent);
    }

    /* Aroma chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid #eadccf;
      font-size: 12px;
      font-weight: 600;
    }
    .pairing-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.86);
      border: 1px solid #eadccf;
      font-size: 12px;
      font-weight: 600;
    }

    .pairing-icon {
      font-size: 14px;
      line-height: 1;
    }

    .search-snippet {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    </style>

  <!-- Leaflet (真實地圖) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>
<body>

<div class="toolbar" id="topToolbar">
  <button class="toolbar-toggle" id="toolbarToggle" type="button">Filters ▾</button>
  
  <div class="toolbar-row">
    <input id="searchInput" placeholder="Search country, region, or grape..." />
  </div>

  <div class="toolbar-row" id="toolbarActions">
    <button class="btn filter-btn active" data-filter="all">All</button>
    <button class="btn filter-btn" data-filter="still">Still</button>
    <button class="btn filter-btn" data-filter="sparkling">Sparkling</button>
    <button class="btn filter-btn" data-filter="fortified">Fortified</button>

    <button class="btn secondary" id="quizBtn">Quiz</button>
    <button class="btn secondary" id="favoritesBtn">Favorites</button>
    <button class="btn secondary" id="progressBtn">Progress</button>
    <button class="btn secondary" id="recentBtn">Recent</button>
  </div>
</div>

<div id="map"></div>
<div id="bottomSheet" class="state-collapsed">
  <div class="sheet-handle-wrap">
    <div class="sheet-handle"></div>
    <div class="panel-badge">Wine Atlas PRO</div>
    <h2 id="title">Click a country</h2>
    <div id="breadcrumb" style="margin-bottom:10px; color:#666;"></div>
  </div>

  <div class="sheet-body" id="sheetBody">
    <div id="content">...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="js/app.js?v=4"></script>

</body>
</html>
